services:
  db-task:
    image: mysql:8.0
    container_name: db-task
    environment:
      MYSQL_DATABASE: task_db
      MYSQL_ROOT_PASSWORD: fatec
    ports:
      - "3311:3306"
    volumes:
      - task_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  task-service:
    build:
      context: ./task-service
      dockerfile: ../Dockerfile
    container_name: task-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-task:3306/task_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=fatec
      - SERVER_PORT=8085
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      db-task:
        condition: service_healthy

volumes:
  task_mysql_data:
    name: task_mysql_data
